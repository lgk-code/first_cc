<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 · POCKET LCD</title>
<style>
  :root {
    --shell:   #26271f;   /* 机身塑料 */
    --shell-2: #33342a;   /* 机身高光/按键 */
    --shell-lo:#15160f;   /* 机身阴影/边 */
    --lcd:     #aebf8f;   /* LCD 背光 */
    --ink:     #1c2415;   /* 像素深色 */
    --ink-2:   #28331c;   /* 像素深色（次） */
    --silk:    #82856a;   /* 机身丝印 */
    --amber:   #e8a33d;   /* 唯一彩色：金苹果 / 提示 / LED */
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(120% 90% at 50% -10%, #1c1d16 0%, #101009 60%, #0a0a05 100%);
    font-family: ui-monospace, "Cascadia Code", "Consolas", "Courier New", monospace;
    color: var(--silk);
    user-select: none;
  }

  /* ---------- 设备外壳 ---------- */
  .device {
    width: min(468px, 94vw);
    background: linear-gradient(180deg, var(--shell-2) 0%, var(--shell) 14%, var(--shell) 86%, var(--shell-lo) 100%);
    border-radius: 30px 30px 40px 40px;
    padding: 22px 22px 26px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.06),
      inset 0 -10px 24px rgba(0,0,0,.5),
      0 28px 60px rgba(0,0,0,.6);
  }

  /* 铭牌 */
  .brand { display: flex; align-items: baseline; gap: 12px; padding: 2px 6px 14px; }
  .brand .zh {
    font-size: 26px; font-weight: 700; letter-spacing: 14px;
    color: var(--silk); text-shadow: 0 1px 0 rgba(0,0,0,.5);
  }
  .brand .model { font-size: 11px; letter-spacing: 3px; color: #5a5c47; }
  .brand .led {
    margin-left: auto; width: 9px; height: 9px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 10px var(--amber), 0 0 2px #fff inset;
    animation: ledPulse 2.6s ease-in-out infinite;
  }

  /* ---------- 屏幕（外框 + LCD） ---------- */
  .screen {
    background: linear-gradient(180deg, #111208, #0c0d06);
    border-radius: 16px;
    padding: 14px;
    box-shadow: inset 0 4px 14px rgba(0,0,0,.8), inset 0 0 0 1px rgba(0,0,0,.6);
  }
  .lcd {
    position: relative;
    background: var(--lcd);
    border-radius: 8px;
    padding: 12px 12px 14px;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 2px #5d6a45,
      inset 0 0 26px rgba(20,28,12,.45);
  }
  /* 通电闪屏（仅一次） */
  .lcd::before {
    content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: #0a0c06; border-radius: inherit;
    animation: powerOn .9s ease-out forwards;
  }

  .readout {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; letter-spacing: 2px; color: var(--ink);
    padding: 1px 3px 9px;
  }
  .readout b { font-weight: 700; }
  .readout .seg { display: inline-block; min-width: 3ch; text-align: right; }

  .wrap { position: relative; }
  canvas { width: 100%; height: auto; display: block; border-radius: 3px; }

  /* 暂停 / 结束 覆盖层 */
  .pausetag {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    font-size: 12px; letter-spacing: 4px; color: var(--ink);
    background: rgba(174,191,143,.7); padding: 2px 10px; border-radius: 3px;
    display: none;
  }
  .pausetag.show { display: block; }
  .overlay {
    position: absolute; inset: 0; z-index: 4;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: rgba(120,134,96,.86); border-radius: 3px; text-align: center;
    line-height: 1.25;
  }
  .overlay.show { display: flex; }
  .overlay h2 {
    margin: 0; font-size: 22px; letter-spacing: 6px; color: var(--ink);
  }
  .overlay .sub { font-size: 15px; font-weight: 700; letter-spacing: 1px; color: var(--ink); }
  .overlay button { margin-top: 6px; }

  /* ---------- 控制区 ---------- */
  .controls { padding: 16px 4px 0; }
  .modes { display: flex; gap: 12px; justify-content: center; }
  .key, .overlay button {
    font-family: inherit; font-size: 13px; letter-spacing: 3px; cursor: pointer;
    padding: 9px 20px; border-radius: 9px;
    background: linear-gradient(180deg, var(--shell-2), #2a2b22);
    color: #b9bda0; border: 1px solid var(--shell-lo);
    box-shadow: 0 3px 0 var(--shell-lo), inset 0 1px 0 rgba(255,255,255,.05);
    transition: transform .04s, box-shadow .04s;
  }
  .key:active, .overlay button:active { transform: translateY(3px); box-shadow: 0 0 0 var(--shell-lo); }
  .key:focus-visible, .overlay button:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  .key.active {
    background: linear-gradient(180deg, #f0b454, var(--amber));
    color: var(--ink); border-color: #b9802b;
    box-shadow: 0 3px 0 #8c5f1d, 0 0 14px rgba(232,163,61,.45);
  }
  .hint {
    margin-top: 16px; text-align: center;
    font-size: 11px; letter-spacing: 1px; color: #5a5c47;
  }
  .hint .amber { color: var(--amber); }

  @keyframes powerOn {
    0% { opacity: 1; }  9% { opacity: .15; }  14% { opacity: .85; }
    26% { opacity: .08; }  40% { opacity: .5; }  100% { opacity: 0; }
  }
  @keyframes ledPulse {
    0%, 100% { opacity: .55; }  50% { opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .lcd::before { animation: none; opacity: 0; }
    .brand .led { animation: none; }
  }
</style>
</head>
<body>
  <div class="device">
    <div class="brand">
      <span class="zh">贪吃蛇</span>
      <span class="model">POCKET · LCD</span>
      <span class="led" aria-hidden="true"></span>
    </div>

    <div class="screen">
      <div class="lcd">
        <div class="readout">
          <span>得分 <b class="seg" id="score">0</b></span>
          <span>最高 <b class="seg" id="best">0</b></span>
        </div>
        <div class="wrap">
          <canvas id="game"></canvas>
          <div class="pausetag" id="pausetag">暂&nbsp;停</div>
          <div class="overlay" id="overlay">
            <h2>游戏结束</h2>
            <div class="sub" id="overText"></div>
            <button id="restart">再来一局 ( 空格 )</button>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="modes">
        <button class="key active" id="mNormal">常规</button>
        <button class="key" id="mWrap">穿墙</button>
      </div>
      <div class="hint">
        方向键 / WASD 移动 &nbsp;·&nbsp; 空格暂停 &nbsp;·&nbsp;
        <span class="amber">金苹果 +50</span> 限时
      </div>
    </div>
  </div>

<script>
const COLS = 20, ROWS = 20, CELL = 22;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overText = document.getElementById('overText');
const pausetag = document.getElementById('pausetag');

let snake, lastSnake, grew, dir, nextDir, food, bonus;
let score, best, speed, paused, dead, wrapMode;
let gameClock, lastStepClock, lastFrame;

const BONUS_TTL = 6000;   // 金苹果存活时间(ms)
const BONUS_SCORE = 50;

// LCD 调色板
const LCD = '#aebf8f', INK = '#1c2415', INK2 = '#28331c', EYE = '#c4cf9f', AMBER = '#e8a33d';

// 每个模式各自记录最高分
function bestKey() { return wrapMode ? 'snakeBestWrap' : 'snakeBestNormal'; }
function loadBest() {
  let v = localStorage.getItem(bestKey());
  // 迁移：旧版共用的 snakeBest 归入常规模式
  if (v === null && !wrapMode) v = localStorage.getItem('snakeBest');
  best = Number(v || 0);
  bestEl.textContent = best;
}

function reset() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  lastSnake = snake.map(s => ({...s}));
  grew = false;
  dir = {x:1,y:0};
  nextDir = dir;
  score = 0; speed = 150;
  paused = false; dead = false;
  bonus = null;
  gameClock = 0; lastStepClock = 0; lastFrame = 0;
  scoreEl.textContent = 0;
  placeFood();
  overlay.classList.remove('show');
}

function emptyCell() {
  while (true) {
    const c = { x:(Math.random()*COLS)|0, y:(Math.random()*ROWS)|0 };
    if (snake.some(s => s.x===c.x && s.y===c.y)) continue;
    if (food && food.x===c.x && food.y===c.y) continue;
    if (bonus && bonus.x===c.x && bonus.y===c.y) continue;
    return c;
  }
}

function placeFood() {
  food = emptyCell();
  // 30% 概率同时刷新一个限时金苹果
  if (!bonus && Math.random() < 0.3) {
    const c = emptyCell();
    bonus = { x:c.x, y:c.y, born: gameClock };
  }
}

function step() {
  dir = nextDir;
  let hx = snake[0].x + dir.x, hy = snake[0].y + dir.y;

  if (wrapMode) {
    hx = (hx + COLS) % COLS;
    hy = (hy + ROWS) % ROWS;
  } else if (hx < 0 || hx >= COLS || hy < 0 || hy >= ROWS) {
    return gameOver();
  }
  const head = { x:hx, y:hy };
  if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();

  lastSnake = snake.map(s => ({...s}));
  snake.unshift(head);
  grew = false;

  if (head.x===food.x && head.y===food.y) {
    score += 10; grew = true;
    if (speed > 70) speed -= 4;
    placeFood();
  } else if (bonus && head.x===bonus.x && head.y===bonus.y) {
    score += BONUS_SCORE; grew = true;
    bonus = null;
  } else {
    snake.pop();
  }
  scoreEl.textContent = score;
}

function updateBonus() {
  if (bonus && gameClock - bonus.born >= BONUS_TTL) bonus = null;
}

function gameOver() {
  dead = true;
  if (score > best) {
    best = score;
    localStorage.setItem(bestKey(), best);
    bestEl.textContent = best;
  }
  overText.textContent = `本局得分 ${score}`;
  overlay.classList.add('show');
}

// ---------- 渲染 ----------
function segFrom(i) {
  if (grew) return i === 0 ? lastSnake[0] : snake[i];
  return lastSnake[i] || snake[i];
}

function lerp(a, b, t) { return a + (b - a) * t; }

function drawMatrix() {
  // LCD 背光 + 点阵纹理（每格中心一个未点亮的暗点）
  ctx.fillStyle = LCD;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(28,36,21,0.10)';
  for (let gx = 0; gx < COLS; gx++) {
    for (let gy = 0; gy < ROWS; gy++) {
      ctx.beginPath();
      ctx.arc((gx+0.5)*CELL, (gy+0.5)*CELL, 1.1, 0, Math.PI*2);
      ctx.fill();
    }
  }
  drawBorder();
}

function drawBorder() {
  const W = canvas.width, H = canvas.height;
  ctx.strokeStyle = INK;
  if (wrapMode) {
    // 穿墙模式：虚线边框，提示可穿过
    ctx.setLineDash([CELL*0.30, CELL*0.26]);
    ctx.lineWidth = 2.5;
    ctx.strokeRect(4, 4, W-8, H-8);
    ctx.setLineDash([]);
  } else {
    // 常规模式：实心墙框（外粗 + 内细，做出 LCD 框感）
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, W-4, H-4);
    ctx.lineWidth = 1.5;
    ctx.strokeRect(7, 7, W-14, H-14);
  }
}

function draw(t) {
  drawMatrix();

  // 普通食物：深色像素方块（圆角）
  if (food) drawFood(food.x, food.y);

  // 金苹果：屏上唯一彩色，轻微闪烁 + 环形计时
  if (bonus) {
    const frac = 1 - (gameClock - bonus.born) / BONUS_TTL;
    const blink = 0.55 + 0.45 * Math.abs(Math.sin(gameClock * 0.006));
    ctx.globalAlpha = blink;
    drawDiamond(bonus.x, bonus.y, AMBER);
    ctx.globalAlpha = 1;
    drawTimerRing(bonus.x, bonus.y, frac);
  }

  // 蛇身（圆形，平滑插值）
  for (let i = snake.length - 1; i >= 0; i--) {
    let from = segFrom(i), to = snake[i];
    let tt = t;
    // 穿墙瞬移时不插值，避免横穿屏幕
    if (Math.abs(from.x - to.x) > 1 || Math.abs(from.y - to.y) > 1) { from = to; tt = 1; }
    const cx = (lerp(from.x, to.x, tt) + 0.5) * CELL;
    const cy = (lerp(from.y, to.y, tt) + 0.5) * CELL;
    if (i === 0) drawHead(cx, cy);
    else {
      const r = CELL * 0.42 * (1 - i / (snake.length * 2.4));
      circle(cx, cy, Math.max(r, CELL*0.30), i % 2 ? INK : INK2);
    }
  }
}

function drawHead(cx, cy) {
  circle(cx, cy, CELL * 0.46, INK);
  // 眼睛：朝向移动方向（用背光色，像未点亮的像素）
  const ex = dir.x, ey = dir.y;
  const fx = ex * CELL*0.15, fy = ey * CELL*0.15;
  const px = -ey * CELL*0.18, py = ex * CELL*0.18;
  for (const s of [1, -1]) {
    circle(cx + fx + px*s, cy + fy + py*s, CELL*0.10, EYE);
  }
}

function drawFood(gx, gy) {
  const x = gx*CELL + CELL*0.26, y = gy*CELL + CELL*0.26, s = CELL*0.48;
  ctx.fillStyle = INK;
  roundRect(x, y, s, s, 3);
  ctx.fill();
}

function drawDiamond(gx, gy, color) {
  const cx = (gx+0.5)*CELL, cy = (gy+0.5)*CELL, r = CELL*0.40;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r, cy);
  ctx.lineTo(cx, cy + r); ctx.lineTo(cx - r, cy);
  ctx.closePath(); ctx.fill();
}

function drawTimerRing(gx, gy, frac) {
  const cx = (gx+0.5)*CELL, cy = (gy+0.5)*CELL;
  ctx.beginPath();
  ctx.arc(cx, cy, CELL*0.46, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.max(frac,0));
  ctx.strokeStyle = AMBER;
  ctx.lineWidth = 2.5;
  ctx.stroke();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function circle(x, y, r, color) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
}

// ---------- 主循环 ----------
function frame(now) {
  if (!lastFrame) lastFrame = now;
  const dt = now - lastFrame;
  lastFrame = now;

  if (!paused && !dead) {
    gameClock += dt;
    if (gameClock - lastStepClock >= speed) {
      step();
      lastStepClock = gameClock;
    }
    updateBonus();
  }
  const t = Math.min((gameClock - lastStepClock) / speed, 1);
  draw(t);
  pausetag.classList.toggle('show', paused && !dead);
  requestAnimationFrame(frame);
}

function setDir(x, y) {
  if (dir.x === -x && dir.y === -y) return;  // 不能直接掉头
  nextDir = { x, y };
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k==='arrowup'||k==='w') setDir(0,-1);
  else if (k==='arrowdown'||k==='s') setDir(0,1);
  else if (k==='arrowleft'||k==='a') setDir(-1,0);
  else if (k==='arrowright'||k==='d') setDir(1,0);
  else if (k===' ') {
    e.preventDefault();
    if (dead) reset();
    else paused = !paused;
  }
});

const mNormal = document.getElementById('mNormal');
const mWrap = document.getElementById('mWrap');
function setMode(wrap) {
  wrapMode = wrap;
  mWrap.classList.toggle('active', wrap);
  mNormal.classList.toggle('active', !wrap);
  loadBest();   // 切到该模式各自的最高分
  reset();
}
mNormal.addEventListener('click', () => setMode(false));
mWrap.addEventListener('click', () => setMode(true));
document.getElementById('restart').addEventListener('click', reset);

wrapMode = false;
loadBest();
reset();
requestAnimationFrame(frame);
</script>
</body>
</html>
